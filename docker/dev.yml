name: donation-timer
# mem_limit contains a leak to its own container (restart: always revives it) instead of letting it
# swap-thrash the whole VM; log max-size keeps container logs from filling the disk on long runs.
# json-file + max-size only: the one logging config both docker and podman accept.
services:
  dev-front:
    restart: always
    mem_limit: 1g
    logging:
      driver: json-file
      options:
        max-size: 10m
    environment:
      - CLIENT_ID=${CLIENT_ID}
      - VITE_CLIENT_ID=${VITE_CLIENT_ID}
      - VITE_REDIRECT_URL=${VITE_REDIRECT_URL}
      - VITE_BASE_URL=${VITE_BASE_URL}
    build:
      context: ..
      dockerfile: docker/Dockerfile-dev-front
    ports:
      - "3080:5173"
    networks:
      - backnet
    volumes:
      - ../front/:/home/node/app/
      - front_node_modules:/home/node/app/node_modules
  dev-back:
    restart: always
    mem_limit: 1g
    logging:
      driver: json-file
      options:
        max-size: 10m
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:5432/
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - CLIENT_ID=${CLIENT_ID}
      - WH_PATH=${WH_PATH}
    build:
      context: ..
      dockerfile: docker/Dockerfile-dev-back
    ports:
      - "3003:3003"
    networks:
      - backnet
    volumes:
      - ../back/:/home/node/app/
      - back_node_modules:/home/node/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
  postgres:
    restart: always
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: 10m
    image: postgres:14.5-alpine
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - 5432:5432
    networks:
      - backnet
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
        test: ["CMD-SHELL", "pg_isready -U postgres"]
        interval: 5s
        timeout: 5s
        retries: 5
networks:
  backnet:
    driver: bridge
volumes:
  pgdata:
  back_node_modules:
  front_node_modules:
