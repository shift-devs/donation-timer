worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       3080;
        server_name  localhost;
        root   /usr/share/nginx/html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /ws {
            # resolve at request time via docker's embedded DNS, so a backend
            # restart (new container IP) doesn't leave nginx on a stale address
            resolver 127.0.0.11 valid=10s;
            set $backend pro-back;
            proxy_pass http://$backend:3003;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # backend heartbeats every 10s, so idle sockets never get near this
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }
    }
}
