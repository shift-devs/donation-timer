name: donation-timer
# mem_limit contains a leak to its own container (restart: always revives it) instead of letting it
# swap-thrash the whole VM; log max-size keeps container logs from filling the disk on long runs.
# json-file + max-size only: the one logging config both docker and podman accept.
services:
  pro-front:
    restart: always
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: 10m
    build:
      context: ..
      dockerfile: docker/Dockerfile-pro-front
    ports:
      - "3080:3080"
    networks:
      - backnet
  pro-back:
    restart: always
    mem_limit: 1g
    logging:
      driver: json-file
      options:
        max-size: 10m
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:5432/
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - CLIENT_ID=${CLIENT_ID}
    build:
      context: ..
      dockerfile: docker/Dockerfile-pro-back
    networks:
      - backnet
    depends_on:
      postgres:
        condition: service_healthy
  postgres:
    restart: always
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: 10m
    image: postgres:14.5-alpine
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    networks:
      - backnet
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
        test: ["CMD-SHELL", "pg_isready -U postgres"]
        interval: 5s
        timeout: 5s
        retries: 5
networks:
  backnet:
    driver: bridge
volumes:
  pgdata:
